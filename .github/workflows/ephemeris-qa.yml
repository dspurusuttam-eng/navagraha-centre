name: Ephemeris QA

# Runs the deterministic astrology QA harnesses on the project's sanctioned
# runtime (package.json engines.node = 22.x), where the `swisseph` native
# binary builds and loads correctly.
#
# Purpose: prove the ephemeris-backed QA groups that cannot run on developer
# machines pinned to a different Node major (e.g. Node 24), without weakening
# or skipping those tests.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ephemeris-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ephemeris-qa:
    name: Ephemeris QA (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies (builds swisseph native module)
        run: npm ci

      - name: Verify swisseph loads natively
        run: node -e "const swe=require('swisseph'); if (typeof swe.swe_calc_ut!=='function') { throw new Error('swisseph loaded without swe_calc_ut'); } console.log('swisseph-ready');"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Gochar + Sade Sati QA (must be fully unblocked)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:gochar:qa 2>&1 | tee gochar-qa.log

          if ! grep -q "0 environment-blocked" gochar-qa.log; then
            echo "::error::Gochar QA still reports environment-blocked groups. QA 8/9 must run on this runner."
            grep -n "environment-blocked" gochar-qa.log || true
            exit 1
          fi

          if ! grep -q "12 groups passed, 0 environment-blocked" gochar-qa.log; then
            echo "::error::Gochar QA summary did not report 12 groups passed, 0 environment-blocked."
            tail -n 20 gochar-qa.log
            exit 1
          fi

          echo "Gochar QA: 12 groups passed, 0 environment-blocked."

      - name: Premium Daily Horoscope QA (Card 8B, deterministic)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:horoscope:daily:qa 2>&1 | tee horoscope-daily-qa.log

          if ! grep -q "0 failed" horoscope-daily-qa.log; then
            echo "::error::Premium Daily Horoscope QA reported failures."
            tail -n 40 horoscope-daily-qa.log
            exit 1
          fi

          echo "Premium Daily Horoscope QA: all groups passed."

      - name: Premium Daily Horoscope REAL integration QA (Card 8B-R1, Node 22)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:horoscope:daily:integration:qa 2>&1 | tee horoscope-integration-qa.log

          if ! grep -q "swisseph=available" horoscope-integration-qa.log; then
            echo "::error::Integration QA did not detect swisseph on the Node 22 runner; ephemeris groups cannot be proven."
            tail -n 40 horoscope-integration-qa.log
            exit 1
          fi

          if ! grep -q "0 failed, 0 environment-blocked" horoscope-integration-qa.log; then
            echo "::error::Real horoscope integration QA must pass with 0 failed and 0 environment-blocked on Node 22."
            tail -n 40 horoscope-integration-qa.log
            exit 1
          fi

          echo "Premium Daily Horoscope integration QA: all real-dependency groups passed."

      - name: Premium Panchang QA (Card 9.2, pure deterministic)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:panchang:premium:qa 2>&1 | tee panchang-premium-qa.log

          if ! grep -q "0 failed" panchang-premium-qa.log; then
            echo "::error::Premium Panchang pure QA reported failures."
            tail -n 40 panchang-premium-qa.log
            exit 1
          fi

          echo "Premium Panchang pure QA: all groups passed."

      - name: Premium Panchang REAL integration QA (Card 9.2, Node 22)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:panchang:premium:integration:qa 2>&1 | tee panchang-premium-integration-qa.log

          if ! grep -q "swisseph=available" panchang-premium-integration-qa.log; then
            echo "::error::Panchang integration QA did not detect swisseph on the Node 22 runner."
            tail -n 40 panchang-premium-integration-qa.log
            exit 1
          fi

          if ! grep -q "0 failed, 0 environment-blocked" panchang-premium-integration-qa.log; then
            echo "::error::Premium Panchang integration QA must pass with 0 failed and 0 environment-blocked on Node 22."
            tail -n 40 panchang-premium-integration-qa.log
            exit 1
          fi

          echo "Premium Panchang integration QA: all real-ephemeris groups passed."

      - name: Premium Matchmaking QA (Card 10.2, pure exhaustive)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:matchmaking:premium:qa 2>&1 | tee matchmaking-premium-qa.log

          if ! grep -q "0 failed" matchmaking-premium-qa.log; then
            echo "::error::Premium Matchmaking pure QA reported failures."
            tail -n 40 matchmaking-premium-qa.log
            exit 1
          fi

          echo "Premium Matchmaking pure QA: all groups passed."

      - name: Matchmaking legacy consumer compatibility QA (Card 10.2)
        shell: bash
        run: |
          set -o pipefail
          npm run debug:matchmaking:legacy-compat:qa 2>&1 | tee matchmaking-legacy-compat-qa.log

          if ! grep -q '"legacyCompat": "PASS"' matchmaking-legacy-compat-qa.log; then
            echo "::error::Matchmaking legacy consumer compatibility QA did not pass."
            tail -n 40 matchmaking-legacy-compat-qa.log
            exit 1
          fi

          echo "Matchmaking legacy consumer compatibility QA: passed."

      - name: Upload Gochar QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gochar-qa-log
          path: gochar-qa.log
          if-no-files-found: ignore
