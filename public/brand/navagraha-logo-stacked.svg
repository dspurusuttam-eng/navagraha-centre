<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 460" role="img" aria-labelledby="title desc">
  <title id="title">NAVAGRAHA CENTRE Stacked Logo</title>
  <desc id="desc">Golden Om mandala emblem with stacked NAVAGRAHA CENTRE wordmark.</desc>
  <defs>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e6b4"/>
      <stop offset="44%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b9871f"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#fffdf4"/>
      <stop offset="100%" stop-color="#f2e0b1"/>
    </radialGradient>
    <path id="ray" d="M210 24 L196 84 L224 84 Z"/>
  </defs>

  <g opacity="0.92">
    <use href="#ray" fill="url(#goldStroke)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(45 210 210)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(90 210 210)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(135 210 210)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(180 210 210)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(225 210 210)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(270 210 210)"/>
    <use href="#ray" fill="url(#goldStroke)" transform="rotate(315 210 210)"/>
  </g>
  <circle cx="210" cy="210" r="154" fill="none" stroke="url(#goldStroke)" stroke-width="10"/>
  <circle cx="210" cy="210" r="114" fill="none" stroke="url(#goldStroke)" stroke-width="7"/>
  <circle cx="210" cy="210" r="84" fill="url(#coreGlow)" stroke="url(#goldStroke)" stroke-width="6"/>
  <text
    x="210"
    y="242"
    text-anchor="middle"
    font-size="108"
    font-family="'Noto Serif Devanagari', 'Mangal', 'Kohinoor Devanagari', serif"
    fill="url(#goldStroke)"
    stroke="#a46b12"
    stroke-width="1.6"
    paint-order="stroke fill"
  >&#x0950;</text>

  <text
    x="210"
    y="394"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Times New Roman', serif"
    font-size="50"
    font-weight="600"
    letter-spacing="6"
    fill="#2f261e"
  >NAVAGRAHA CENTRE</text>
  <text
    x="210"
    y="434"
    text-anchor="middle"
    font-family="'Manrope', 'Segoe UI', sans-serif"
    font-size="17"
    font-weight="600"
    letter-spacing="3.2"
    fill="#7f6232"
  >VEDIC ASTROLOGY &#x2022; ASK NI</text>
</svg>
