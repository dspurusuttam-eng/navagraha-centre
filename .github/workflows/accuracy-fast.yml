name: Accuracy CI (Fast)

# Card 11.R5 — permanent fast accuracy gate for every relevant PR/push.
# Runs on the sanctioned Node 22 runtime (swisseph native ABI). The JPL DE440s kernel
# is cached + checksum-verified (never committed, never in the app bundle). Validation
# tooling stays in tools/card11-reference-lab and never enters the production graph.

on:
  pull_request:
    paths:
      - "src/lib/astrology/**"
      - "src/modules/astrology/**"
      - "src/modules/panchang/**"
      - "tools/card11-reference-lab/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/accuracy-*.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: accuracy-fast-${{ github.ref }}
  cancel-in-progress: true

env:
  DE440S_SHA256: c1c7feeab882263fc493a9d5a5b2ddd71b54826cdf65d8d17a76126b260a49f2
  DE440S_URL: https://naif.jpl.nasa.gov/pub/naif/generic_kernels/spk/planets/de440s.bsp

jobs:
  accuracy-fast:
    name: Accuracy Fast (Node 22 / Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Use Python 3.12 (pinned)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install production deps (builds swisseph)
        run: npm ci

      - name: Verify swisseph loads natively
        run: node -e "const s=require('swisseph'); if(typeof s.swe_calc_ut!=='function'){throw new Error('swisseph not loaded')}; console.log('swisseph-ready')"

      - name: Root typecheck / lint / build
        run: |
          npm run typecheck
          npm run lint
          npm run build

      - name: Existing engine regressions (Node 22)
        run: |
          set -e
          npm run debug:gochar:qa
          npm run debug:panchang:premium:qa
          npm run debug:horoscope:daily:qa
          npm run debug:varga:qa
          npm run debug:dasha:5level:qa
          npm run debug:ashtakavarga:qa
          npm run debug:matchmaking:premium:qa
          npm run debug:matchmaking:advanced:qa
          npm run debug:matchmaking:legacy-compat:qa
          npm run debug:numerology:premium:qa
          npm run debug:muhurat:premium:qa

      - name: Restore/verify DE440s kernel (cache; checksum gate)
        uses: actions/cache@v4
        with:
          path: tools/card11-reference-lab/cache/de440s.bsp
          key: de440s-${{ env.DE440S_SHA256 }}

      - name: Ensure kernel present + checksum
        run: |
          set -e
          f=tools/card11-reference-lab/cache/de440s.bsp
          mkdir -p "$(dirname "$f")"
          if [ ! -f "$f" ]; then curl -sSL -o "$f" "$DE440S_URL"; fi
          echo "$DE440S_SHA256  $f" | sha256sum -c -

      - name: Lab install (isolated subproject) + Python oracle deps (pinned)
        run: |
          (cd tools/card11-reference-lab/node && npm ci)
          python -m pip install --upgrade pip
          python -m pip install "skyfield==1.54" "numpy>=2,<3" "jplephem>=2.22"

      - name: Manifest + checksum validation
        working-directory: tools/card11-reference-lab/python
        run: python kernel_manifest.py

      - name: Core golden fixtures + boundary + True Node/Lahiri continuity (oracle)
        working-directory: tools/card11-reference-lab
        run: |
          set -e
          LAB="$PWD"
          cp node/src/current-engine-adapter-r2.ts "$GITHUB_WORKSPACE/scripts/_adapter.ci.ts"
          (cd "$GITHUB_WORKSPACE" && SWISSEPH_EPHE_PATH="$PWD/node_modules/swisseph/ephe" LAB_DIR="$LAB" npx tsx scripts/_adapter.ci.ts && rm -f scripts/_adapter.ci.ts)
          (cd python && python skyfield_oracle_r2.py)
          (cd node && npx tsx src/comparator-r2.ts)

      - name: Lab suites (pure + guards + timezone; validates generated artifacts)
        working-directory: tools/card11-reference-lab/node
        run: |
          npm run typecheck
          npx tsx tests/run-tests.ts
          npx tsx tests/run-tests-r2.ts
          npx tsx tests/run-tests-tz.ts
          npx tsx tests/run-tests-guards.ts

      - name: Global-state regression (in-project, Node 22)
        run: |
          cp tools/card11-reference-lab/node/src/global-state-regression.ts scripts/_gs.ci.ts
          SWISSEPH_EPHE_PATH="$PWD/node_modules/swisseph/ephe" npx tsx scripts/_gs.ci.ts
          rm -f scripts/_gs.ci.ts

      - name: Git diff check
        run: git diff --check
