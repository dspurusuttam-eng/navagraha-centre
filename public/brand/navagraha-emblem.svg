<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">NAVAGRAHA CENTRE Emblem</title>
  <desc id="desc">Golden Om symbol inside sacred mandala and eight-point star geometry.</desc>
  <defs>
    <linearGradient id="goldOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e6b4"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="78%" stop-color="#b9871f"/>
      <stop offset="100%" stop-color="#f2d27c"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="0%" y1="10%" x2="100%" y2="95%">
      <stop offset="0%" stop-color="#fff7d8"/>
      <stop offset="52%" stop-color="#e0b64d"/>
      <stop offset="100%" stop-color="#b07614"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="40%" r="66%">
      <stop offset="0%" stop-color="#fffdf4"/>
      <stop offset="68%" stop-color="#f2e2b5"/>
      <stop offset="100%" stop-color="#e3c981"/>
    </radialGradient>
    <path id="ray" d="M128 16 L116 68 L140 68 Z"/>
    <path id="petal" d="M128 52 C120 66 120 79 128 90 C136 79 136 66 128 52 Z"/>
    <path id="diamond" d="M128 30 L136 38 L128 46 L120 38 Z"/>
  </defs>

  <g opacity="0.95">
    <use href="#ray" fill="url(#goldInner)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(45 128 128)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(90 128 128)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(135 128 128)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(180 128 128)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(225 128 128)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(270 128 128)"/>
    <use href="#ray" fill="url(#goldInner)" transform="rotate(315 128 128)"/>
  </g>

  <circle cx="128" cy="128" r="103" fill="none" stroke="url(#goldOuter)" stroke-width="4"/>
  <circle cx="128" cy="128" r="86" fill="none" stroke="url(#goldInner)" stroke-width="8"/>
  <circle cx="128" cy="128" r="66" fill="none" stroke="url(#goldOuter)" stroke-width="5"/>

  <g opacity="0.92">
    <use href="#petal" fill="url(#goldInner)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(22.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(45 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(67.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(90 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(112.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(135 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(157.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(180 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(202.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(225 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(247.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(270 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(292.5 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(315 128 128)"/>
    <use href="#petal" fill="url(#goldInner)" transform="rotate(337.5 128 128)"/>
  </g>

  <circle cx="128" cy="128" r="54" fill="url(#coreGlow)" stroke="url(#goldOuter)" stroke-width="4"/>
  <text
    x="128"
    y="147"
    text-anchor="middle"
    font-size="72"
    font-family="'Noto Serif Devanagari', 'Mangal', 'Kohinoor Devanagari', serif"
    fill="url(#goldOuter)"
    stroke="#ad7318"
    stroke-width="1.2"
    paint-order="stroke fill"
  >&#x0950;</text>

  <g opacity="0.9">
    <use href="#diamond" fill="url(#goldOuter)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(45 128 128)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(90 128 128)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(135 128 128)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(180 128 128)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(225 128 128)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(270 128 128)"/>
    <use href="#diamond" fill="url(#goldOuter)" transform="rotate(315 128 128)"/>
  </g>
</svg>
